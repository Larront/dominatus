name: CI

on:
  pull_request:
  push:
    branches: [main]

# A new push to a branch/PR cancels its in-flight run — no point finishing a superseded build.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: check + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Track the Dockerfile's rolling `oven/bun:1` so CI runs on the same runtime as prod.
          bun-version: latest
      - run: bun install --frozen-lockfile
      # NB: the `client` vitest project (vite.config.ts) runs Svelte component tests under
      # Playwright chromium. There are none yet, so the browser install is omitted to keep CI
      # fast — add `bunx playwright install --with-deps chromium` here when the first one lands.
      - run: bun run check
      - run: bun run test

  image:
    name: build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build only — pushing to a registry + redeploy (CD) is a separate, deploy-time step.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dominatus:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
