name: Publish image

# Cut a deployable image only when a version tag is pushed (e.g. `git tag v1.0.0 && git push --tags`).
# Day-to-day pushes to main are validated by ci.yml (build-only); this is the deliberate release cut.
on:
  push:
    tags: ['v*']

# GITHUB_TOKEN needs package write to push to GHCR; contents read for the checkout.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: build + push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Derive image tags from the git tag. metadata-action lowercases the name, so
      # ghcr.io/Larront/dominatus -> ghcr.io/larront/dominatus. A push of v1.2.3 yields
      # tags 1.2.3, 1.2, and (via latest=auto, skipped for pre-releases) latest.
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
