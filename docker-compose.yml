services:
  app:
    # Pull-based deploy: the host (Dockge) runs the published image — no source checkout needed.
    # `docker compose pull && docker compose up -d`, or Dockge's Deploy button. Pin a release with
    # IMAGE_TAG=0.1.0 in the stack .env, else it tracks :latest. The image is built + pushed by CI
    # (.github/workflows/publish.yml), not from here — there is deliberately no `build:` so a
    # source-less box never tries to build on `up`. To build locally instead: `docker build .`.
    image: ghcr.io/larront/dominatus:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # The server's .env must set ORIGIN=https://dominatus.larront.com (the public tunnel hostname) —
    # it drives Secure cookies, CSRF, Better Auth, and adapter-node URL building. Not overridden
    # here so the value stays host-injected; the committed .env.example default is localhost dev.
    env_file: .env
    environment:
      # Override the local default with the volume path inside the container.
      DATABASE_URL: /data/local.db
      # adapter-node defaults to 512K, which silently rejects scoresheet uploads. Keep this above
      # the 12 MiB image cap (MAX_IMAGE_BYTES in report-images.ts) plus multipart/form overhead.
      BODY_SIZE_LIMIT: 16M
    # Resource ceilings. Tesseract OCR (server-side, on the /analyze path) is the memory driver — do
    # not set mem_limit too low or a scoresheet analysis can be OOM-killed. Starting points; tune to
    # the host. (mem_limit/cpus are honoured by `docker compose up` and Podman without swarm.)
    mem_limit: 1g
    cpus: 2.0
    volumes:
      - dominatus-data:/data
      # Snapshots written by `bun scripts/backup.js`. Separate volume so a botched
      # `docker compose down -v` on data doesn't take the backups with it by accident.
      - dominatus-backups:/backups
    ports:
      # Host port 3000 was already taken on the box, so publish on a free port bound to localhost
      # only — the host-level cloudflared is the sole thing that needs to reach it (no need to
      # expose it on all interfaces). If 3001 also collides, pick another and match it in the
      # cloudflared ingress rule (service: http://localhost:3001).
      - '127.0.0.1:3001:3000'
    # Cap log growth: the json-file driver is unbounded by default and the structured
    # request log will fill a disk over time. 10MB x 5 files = ~50MB retained per service.
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

volumes:
  dominatus-data:
  dominatus-backups:
