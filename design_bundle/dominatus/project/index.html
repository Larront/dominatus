<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>Vorhast — Campaign Command</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="space-bg"></div>
		<div id="starhost"></div>
		<div id="root"></div>
		<div class="vignette"></div>
		<div class="grain"></div>

		<template id="__bundler_thumbnail">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
				<rect width="100" height="100" fill="#0a0e1c" />
				<circle
					cx="50"
					cy="50"
					r="30"
					fill="none"
					stroke="#ffb000"
					stroke-width="0.8"
					opacity="0.35"
				/>
				<circle
					cx="50"
					cy="50"
					r="20"
					fill="none"
					stroke="#ffb000"
					stroke-width="0.8"
					opacity="0.5"
				/>
				<rect x="46" y="46" width="8" height="8" fill="#ffb000" />
				<rect x="77" y="47" width="6" height="6" fill="#5f93c4" />
				<rect x="28" y="47" width="5" height="5" fill="#cf4b34" />
			</svg>
		</template>

		<script
			src="https://unpkg.com/react@18.3.1/umd/react.development.js"
			integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
			crossorigin="anonymous"
		></script>
		<script
			src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
			integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
			crossorigin="anonymous"
		></script>
		<script
			src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
			integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
			crossorigin="anonymous"
		></script>

		<script src="data.js"></script>
		<script src="pixelplanet.js"></script>
		<script type="text/babel" src="tweaks-panel.jsx"></script>
		<script type="text/babel" src="icons.jsx"></script>
		<script type="text/babel" src="map.jsx"></script>
		<script type="text/babel" src="detail.jsx"></script>
		<script type="text/babel" src="modals.jsx"></script>
		<script type="text/babel" src="app.jsx"></script>

		<script type="text/babel" data-presets="env,react">
			// mount the persistent starfield outside the React tree so it doesn't re-randomize
			const Starfield = window.Starfield;
			ReactDOM.createRoot(document.getElementById('starhost')).render(<Starfield />);
		</script>
	</body>
</html>
